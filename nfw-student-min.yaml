AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Minimal per-student VPC + EC2 + NFW endpoint association (single-AZ).
  Deployed via CloudFormation StackSets into target accounts & Regions.
  Creates: VPC with 2 subnets (protected + firewall), EC2 in protected subnet,
  firewall endpoint association, EC2 Instance Connect Endpoint, IGW for internet.
  Traffic flow (bidirectional inspection): EC2 → Firewall Endpoint → IGW → Internet
  Return traffic: Internet → IGW → Firewall Endpoint → EC2.
  Access: AWS Console → EIC Endpoint → EC2 (browser-based SSH).

Parameters:
  LabName:
    Type: String
    Default: nfw-lab-student
    AllowedPattern: '^[A-Za-z0-9-]+$'
    ConstraintDescription: Must contain only alphanumerics and hyphens
    Description: Name of the lab

  FirewallArn:
    Type: String
    Description: ARN of the shared Network Firewall
    AllowedPattern: '^arn:aws:network-firewall:[a-z0-9-]+:[0-9]{12}:firewall\/[A-Za-z0-9-]+$'

  StudentVpcCIDR:
    Type: String
    Default: 10.1.0.0/16
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
    Description: CIDR block for student VPC

  ProtectedSubnetCIDR:
    Type: String
    Default: 10.1.1.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
    Description: CIDR block for protected subnet (EC2 instance)

  FirewallSubnetCIDR:
    Type: String
    Default: 10.1.2.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
    Description: CIDR block for firewall subnet (endpoint association)

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type for student test instance

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Firewall Configuration
        Parameters:
          - FirewallArn
      - Label:
          default: Student VPC Configuration
        Parameters:
          - LabName
          - StudentVpcCIDR
          - ProtectedSubnetCIDR
          - FirewallSubnetCIDR
      - Label:
          default: EC2 Configuration
        Parameters:
          - InstanceType

Mappings:
  # Amazon Linux 2023 AMI IDs by region (always use latest AL2023)
  RegionMap:
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    eu-west-2:
      AMI: ami-0ba0c1a358147d1a8
    ap-southeast-1:
      AMI: ami-0ac0e4288aa341886

Resources:
  # ============================================================================
  # Student VPC and Networking
  # ============================================================================
  StudentVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref StudentVpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${LabName}-vpc'

  ProtectedSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref StudentVpc
      CidrBlock: !Ref ProtectedSubnetCIDR
      AvailabilityZone: !Select
        - 0
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: !Sub '${LabName}-protected-subnet-az-a'

  FirewallSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref StudentVpc
      CidrBlock: !Ref FirewallSubnetCIDR
      AvailabilityZone: !Select
        - 0
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: !Sub '${LabName}-firewall-subnet-az-a'

  ProtectedRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref StudentVpc
      Tags:
        - Key: Name
          Value: !Sub '${LabName}-protected-rt'

  FirewallRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref StudentVpc
      Tags:
        - Key: Name
          Value: !Sub '${LabName}-firewall-rt'

  ProtectedSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref ProtectedSubnet
      RouteTableId: !Ref ProtectedRouteTable

  FirewallSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref FirewallSubnet
      RouteTableId: !Ref FirewallRouteTable

  # ============================================================================
  # Internet Gateway (enables public subnet for firewall endpoint internet access)
  # ============================================================================
  StudentInternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${LabName}-igw'

  AttachIGW:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref StudentVpc
      InternetGatewayId: !Ref StudentInternetGateway

  # ============================================================================
  # VPC Endpoint Association to Shared Network Firewall
  # ============================================================================
  FirewallEndpointAssociation:
    Type: AWS::NetworkFirewall::VpcEndpointAssociation
    Properties:
      FirewallArn: !Ref FirewallArn
      VpcId: !Ref StudentVpc
      SubnetMapping:
        SubnetId: !Ref FirewallSubnet

  # Route from protected subnet (EC2) to firewall endpoint for inspection
  ProtectedRouteToFirewall:
    Type: AWS::EC2::Route
    DependsOn: FirewallEndpointAssociation
    Properties:
      RouteTableId: !Ref ProtectedRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      VpcEndpointId: !GetAtt FirewallEndpointAssociation.EndpointId

  # Route from firewall subnet to IGW for internet access
  FirewallRouteToIGW:
    Type: AWS::EC2::Route
    DependsOn: AttachIGW
    Properties:
      RouteTableId: !Ref FirewallRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref StudentInternetGateway

  # ============================================================================
  # IGW Edge Route Table (for return traffic inspection)
  # ============================================================================
  IGWRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref StudentVpc
      Tags:
        - Key: Name
          Value: !Sub '${LabName}-igw-rt'

  # Route return traffic from IGW back through firewall for inspection
  IGWRouteToFirewall:
    Type: AWS::EC2::Route
    DependsOn: FirewallEndpointAssociation
    Properties:
      RouteTableId: !Ref IGWRouteTable
      DestinationCidrBlock: !Ref ProtectedSubnetCIDR
      VpcEndpointId: !GetAtt FirewallEndpointAssociation.EndpointId

  # Associate IGW with route table for return traffic inspection
  IGWRouteTableAssociation:
    Type: AWS::EC2::GatewayRouteTableAssociation
    Properties:
      GatewayId: !Ref StudentInternetGateway
      RouteTableId: !Ref IGWRouteTable

  # ============================================================================
  # Security Group for Student EC2 Instance
  # ============================================================================
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${LabName}-sg'
      GroupDescription: Security group for student test instance
      VpcId: !Ref StudentVpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${LabName}-sg'

  # ============================================================================
  # EC2 Instance Connect Endpoint (browser-based SSH access)
  # ============================================================================
  EICEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${LabName}-eic-sg'
      GroupDescription: Security group for EC2 Instance Connect Endpoint
      VpcId: !Ref StudentVpc
      Tags:
        - Key: Name
          Value: !Sub '${LabName}-eic-sg'

  # Security group rules (separate to avoid circular dependency)
  InstanceSecurityGroupIngressFromEIC:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref InstanceSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      SourceSecurityGroupId: !Ref EICEndpointSecurityGroup
      Description: SSH from EC2 Instance Connect Endpoint

  EICEndpointSecurityGroupEgressToInstance:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref EICEndpointSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      DestinationSecurityGroupId: !Ref InstanceSecurityGroup
      Description: SSH to EC2 instance

  EICEndpoint:
    Type: AWS::EC2::InstanceConnectEndpoint
    Properties:
      SubnetId: !Ref ProtectedSubnet
      SecurityGroupIds:
        - !Ref EICEndpointSecurityGroup
      PreserveClientIp: false
      Tags:
        - Key: Name
          Value: !Sub '${LabName}-eic-endpoint'

  # ============================================================================
  # Student Test Instance (t3.micro with public IP for IGW routing)
  # ============================================================================
  StudentTestInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap
        - RegionMap
        - !Ref 'AWS::Region'
        - AMI
      InstanceType: !Ref InstanceType
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref InstanceSecurityGroup
          SubnetId: !Ref ProtectedSubnet
      EbsOptimized: false
      Monitoring: false
      Tags:
        - Key: Name
          Value: !Sub '${LabName}-instance'
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y curl wget bind-utils
          echo "Lab instance ready for testing" > /tmp/lab-ready.txt

Outputs:
  StudentVpcId:
    Description: ID of the student VPC
    Value: !Ref StudentVpc
    Export:
      Name: !Sub '${LabName}-vpc-id'

  ProtectedSubnetId:
    Description: ID of the protected subnet (EC2 instance)
    Value: !Ref ProtectedSubnet
    Export:
      Name: !Sub '${LabName}-protected-subnet-id'

  FirewallSubnetId:
    Description: ID of the firewall subnet (endpoint association)
    Value: !Ref FirewallSubnet
    Export:
      Name: !Sub '${LabName}-firewall-subnet-id'

  FirewallEndpointId:
    Description: ID of the firewall endpoint in this VPC
    Value: !GetAtt FirewallEndpointAssociation.EndpointId
    Export:
      Name: !Sub '${LabName}-firewall-endpoint-id'

  TestInstanceId:
    Description: EC2 instance ID for the test instance
    Value: !Ref StudentTestInstance
    Export:
      Name: !Sub '${LabName}-instance-id'

  TestInstancePrivateIp:
    Description: Private IP address of the test instance
    Value: !GetAtt StudentTestInstance.PrivateIp
    Export:
      Name: !Sub '${LabName}-instance-private-ip'

  TestInstancePublicIp:
    Description: Public IP address of the test instance (for IGW routing)
    Value: !GetAtt StudentTestInstance.PublicIp
    Export:
      Name: !Sub '${LabName}-instance-public-ip'

  EICEndpointId:
    Description: EC2 Instance Connect Endpoint ID (use for browser-based SSH)
    Value: !Ref EICEndpoint
    Export:
      Name: !Sub '${LabName}-eic-endpoint-id'

  InstanceSecurityGroupId:
    Description: Security group ID for the instance
    Value: !Ref InstanceSecurityGroup
    Export:
      Name: !Sub '${LabName}-sg-id'

  InternetGatewayId:
    Description: Internet Gateway ID for public internet access
    Value: !Ref StudentInternetGateway
    Export:
      Name: !Sub '${LabName}-igw-id'

  IGWRouteTableId:
    Description: IGW edge route table ID (for return traffic inspection)
    Value: !Ref IGWRouteTable
    Export:
      Name: !Sub '${LabName}-igw-rt-id'
