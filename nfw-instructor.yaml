AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Instructor shared Network Firewall (single-AZ) + logging for lab.
  Deploys once per account per Region (us-east-1, eu-west-2, ap-southeast-1).
  Creates firewall VPC and shared Network Firewall for the lab,
  and a shared firewall endpoint for student VPC associations.

Parameters:
  FirewallName:
    Type: String
    Default: nfw-lab
    AllowedPattern: '^[A-Za-z0-9-]+$'
    ConstraintDescription: Must contain only alphanumerics and hyphens
    Description: Name of the Network Firewall

  FirewallSubnetCIDR:
    Type: String
    Default: 10.0.1.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
    Description: CIDR block for firewall subnet

  FirewallVpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
    Description: CIDR block for firewall VPC

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Network Firewall Configuration
        Parameters:
          - FirewallName
          - FirewallVpcCIDR
          - FirewallSubnetCIDR

Resources:
  # ============================================================================
  # Firewall VPC and Networking
  # ============================================================================
  FirewallVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref FirewallVpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}-vpc'

  FirewallSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref FirewallVpc
      CidrBlock: !Ref FirewallSubnetCIDR
      AvailabilityZone: !Select
        - 0
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}-subnet-az-a'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}-igw'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref FirewallVpc
      InternetGatewayId: !Ref InternetGateway

  FirewallRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref FirewallVpc
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}-rt'

  RouteToIGW:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref FirewallRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref FirewallSubnet
      RouteTableId: !Ref FirewallRouteTable

  # ============================================================================
  # Network Firewall Configuration
  # ============================================================================
  FirewallPolicy:
    Type: AWS::NetworkFirewall::FirewallPolicy
    Properties:
      FirewallPolicyName: !Sub '${FirewallName}-policy'
      FirewallPolicy:
        StatelessDefaultActions:
          - 'aws:forward_to_sfe'
        StatelessFragmentDefaultActions:
          - 'aws:forward_to_sfe'
      Description: Firewall policy for lab
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}-policy'

  NetworkFirewall:
    Type: AWS::NetworkFirewall::Firewall
    Properties:
      FirewallName: !Ref FirewallName
      Description: Shared Network Firewall for lab
      FirewallPolicyArn: !GetAtt FirewallPolicy.FirewallPolicyArn
      VpcId: !Ref FirewallVpc
      SubnetMappings:
        - SubnetId: !Ref FirewallSubnet
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}'

Outputs:
  FirewallArn:
    Description: ARN of the Network Firewall
    Value: !GetAtt NetworkFirewall.FirewallArn
    Export:
      Name: !Sub '${FirewallName}-firewall-arn'

  FirewallId:
    Description: ID of the Network Firewall
    Value: !Ref NetworkFirewall
    Export:
      Name: !Sub '${FirewallName}-firewall-id'

  FirewallAzName:
    Description: Availability Zone where firewall is deployed
    Value: !Select
      - 0
      - !GetAZs ''
    Export:
      Name: !Sub '${FirewallName}-az-name'

  FirewallVpcId:
    Description: VPC ID of the firewall VPC
    Value: !Ref FirewallVpc
    Export:
      Name: !Sub '${FirewallName}-vpc-id'
