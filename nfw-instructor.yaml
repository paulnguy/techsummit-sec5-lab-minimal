AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Instructor shared Network Firewall (single-AZ) + logging for lab.
  Deploys once per account per Region (us-east-1, eu-west-2, ap-southeast-1).
  Creates firewall VPC, Network Firewall with stateful rule for UDP/53 ALERT,
  and CloudWatch Log Groups for alert and flow logs.

Parameters:
  FirewallName:
    Type: String
    Default: nfw-lab
    AllowedPattern: '^[A-Za-z0-9-]+$'
    ConstraintDescription: Must contain only alphanumerics and hyphens
    Description: Name of the Network Firewall

  FirewallSubnetCIDR:
    Type: String
    Default: 10.0.1.0/24
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
    Description: CIDR block for firewall subnet

  FirewallVpcCIDR:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}\/[0-9]{1,2}$'
    Description: CIDR block for firewall VPC

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Network Firewall Configuration
        Parameters:
          - FirewallName
          - FirewallVpcCIDR
          - FirewallSubnetCIDR

Resources:
  # ============================================================================
  # Firewall VPC and Networking
  # ============================================================================
  FirewallVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref FirewallVpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}-vpc'

  FirewallSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref FirewallVpc
      CidrBlock: !Ref FirewallSubnetCIDR
      AvailabilityZone: !Select
        - 0
        - !GetAZs ''
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}-subnet-az-a'

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}-igw'

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref FirewallVpc
      InternetGatewayId: !Ref InternetGateway

  FirewallRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref FirewallVpc
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}-rt'

  RouteToIGW:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref FirewallRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref FirewallSubnet
      RouteTableId: !Ref FirewallRouteTable

  # ============================================================================
  # Network Firewall Configuration
  # ============================================================================
  FirewallRuleGroup:
    Type: AWS::NetworkFirewall::RuleGroup
    Properties:
      Name: !Sub '${FirewallName}-rules'
      Type: STATEFUL
      RuleGroupFlags:
        - RuleOrder: STRICT_ORDER
      RulesAndGroupsData:
        RulesString: |
          alert udp any any <> any 53 (msg:"Alert on DNS over UDP"; sid:1000001; rev:1;)
      Capacity: 100
      Description: Stateful rule group with ALERT on UDP/53
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}-rule-group'

  AlertLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/network-firewall/alert
      RetentionInDays: 30

  FlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/network-firewall/flow
      RetentionInDays: 30

  FirewallPolicy:
    Type: AWS::NetworkFirewall::FirewallPolicy
    Properties:
      FirewallPolicyName: !Sub '${FirewallName}-policy'
      StatefulEngineOptions:
        RuleOrder: STRICT_ORDER
      StatefulRuleGroupReferences:
        - ResourceArn: !GetAtt FirewallRuleGroup.RuleGroupArn
          Priority: 1
      Description: Firewall policy with stateful rules
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}-policy'

  NetworkFirewall:
    Type: AWS::NetworkFirewall::Firewall
    Properties:
      Name: !Ref FirewallName
      Description: Shared Network Firewall for lab
      FirewallPolicyArn: !GetAtt FirewallPolicy.FirewallPolicyArn
      VpcId: !Ref FirewallVpc
      SubnetMappings:
        - SubnetId: !Ref FirewallSubnet
      Tags:
        - Key: Name
          Value: !Sub '${FirewallName}'

  FirewallLoggingConfiguration:
    Type: AWS::NetworkFirewall::LoggingConfiguration
    Properties:
      FirewallArn: !GetAtt NetworkFirewall.FirewallArn
      LoggingConfiguration:
        LogDestinationConfigs:
          - LogType: ALERT
            LogDestination:
              CloudWatchLogsLogGroup:
                LogGroup: !Ref AlertLogGroup
          - LogType: FLOW
            LogDestination:
              CloudWatchLogsLogGroup:
                LogGroup: !Ref FlowLogGroup

Outputs:
  FirewallArn:
    Description: ARN of the Network Firewall
    Value: !GetAtt NetworkFirewall.FirewallArn
    Export:
      Name: !Sub '${FirewallName}-firewall-arn'

  FirewallId:
    Description: ID of the Network Firewall
    Value: !Ref NetworkFirewall
    Export:
      Name: !Sub '${FirewallName}-firewall-id'

  FirewallEndpointId:
    Description: Endpoint ID of the Network Firewall
    Value: !GetAtt NetworkFirewall.FirewallEndpointIds.FirewallEndpointId
    Export:
      Name: !Sub '${FirewallName}-endpoint-id'

  FirewallAzName:
    Description: Availability Zone where firewall is deployed
    Value: !Select
      - 0
      - !GetAZs ''
    Export:
      Name: !Sub '${FirewallName}-az-name'

  FirewallVpcId:
    Description: VPC ID of the firewall VPC
    Value: !Ref FirewallVpc
    Export:
      Name: !Sub '${FirewallName}-vpc-id'

  AlertLogGroupName:
    Description: CloudWatch Log Group for Alert logs
    Value: !Ref AlertLogGroup
    Export:
      Name: !Sub '${FirewallName}-alert-log-group'

  FlowLogGroupName:
    Description: CloudWatch Log Group for Flow logs
    Value: !Ref FlowLogGroup
    Export:
      Name: !Sub '${FirewallName}-flow-log-group'
